name: BabyBoard
options:
  bundleIdPrefix: com.babyboard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  BabyBoard:
    type: application
    platform: macOS
    sources:
      - path: BabyBoard
        excludes:
          - "*.entitlements"
    info:
      path: BabyBoard/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babyboard.app
        PRODUCT_NAME: BabyBoard
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    entitlements:
      path: BabyBoard/BabyBoard.entitlements
